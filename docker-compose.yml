version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: habitkids
      POSTGRES_USER: habitkids
      POSTGRES_PASSWORD: habitkids_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habitkids"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://habitkids:habitkids_dev@postgres:5432/habitkids
      JWT_SECRET: habitkids-jwt-secret-change-in-production-32ch
      FRONTEND_URL: http://localhost
      PORT: 3000
      VAPID_PUBLIC_KEY: BELky-AiZ493-wF4l4dQ83wLg71vbztRHxFOptjTe7IgX-KvebKB5h7Y6pDqpb9YzhMvwR7x0IR1CYMScYaN6pk
      VAPID_PRIVATE_KEY: PXI_9Rtw1FFXUhoc_k_iTBI03EKaCC-FM9XsW1eOsVg
      FIREBASE_SERVICE_ACCOUNT: ''
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
