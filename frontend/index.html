<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF9F43" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <title>HabitKids ⭐</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@15.1.0/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script>
      // Remplace les emojis texte par des images SVG (compatibilité Kindle Fire et vieux appareils)
      function applyTwemoji() {
        if (!window.twemoji) return
        twemoji.parse(document.body, {
          folder: 'svg',
          ext: '.svg',
          base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/'
        })
      }
      var debounceTimer
      var observer = new MutationObserver(function(mutations) {
        var hasText = mutations.some(function(m) {
          return Array.from(m.addedNodes).some(function(n) { return n.nodeType === 1 })
        })
        if (!hasText) return
        clearTimeout(debounceTimer)
        debounceTimer = setTimeout(applyTwemoji, 150)
      })
      window.addEventListener('load', function() {
        observer.observe(document.getElementById('root'), { childList: true, subtree: true })
        applyTwemoji()
      })
    </script>
  </body>
</html>
